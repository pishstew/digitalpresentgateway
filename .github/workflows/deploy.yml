name: Deploy to Server

on:
  push:
    branches:
      - main   # ganti ke "master" jika branch utama kamu bernama master

jobs:
  deploy:
    name: SSH Deploy via Tailscale
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout kode (diperlukan beberapa action) ──────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Install Tailscale di runner GitHub ──────────────────────
      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret:    ${{ secrets.TS_OAUTH_SECRET }}
          tags:            tag:ci

      # ── 3. Tambah SSH private key ke runner ────────────────────────
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          # Trust host Tailscale server tanpa prompt interaktif
          ssh-keyscan -H 100.109.232.64 >> ~/.ssh/known_hosts

      # ── 4. SSH ke server → jalankan deploy.sh ─────────────────────
      - name: Deploy
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              kepishing@100.109.232.64 \
              "bash /home/kepishing/myserver/website_data/DPG/DPG-main/deploy.sh"
